---
# Environment variables for the location asset assignment workflow.
# To load this configmap in kubernetes:
#   kubectl config set-context --current --namespace=argo-workflows-dev
#   kubectl apply -f <configmapFile> -n argo-workflows-dev
apiVersion: v1
kind: ConfigMap
metadata:
  name: calibration-assignment-env
  namespace: argo-workflows-dev
  labels:
    # Note: This label is required for the informer to detect this ConfigMap.
    workflows.argoproj.io/configmap-type: Parameter
data:
  log_level: DEBUG
  # R code
  relative_path_index: "2"
  parallelization_internal: "4"  # Internal R parallelization for all R modules.
  # Data year file config to restrict processing window.
  data_year_file: data_year_2026.txt
  data_year_bucket: neon-dev-argo-workflow-test
  data_year_bucket_prefix: data_years/data_year_2026.txt
  # Calibration bucket
  calibration_bucket: neon-test-calibration
  calibration_bucket_prefix: files
  # Bucket for writing manifests.
  output_bucket: neon-dev-argo-workflow-test
  output_bucket_prefix: calibration_assignment
  # Manifests for changed files.
  manifest_file_name: manifest.json
  change_manifest_file_name: change_manifest.json
