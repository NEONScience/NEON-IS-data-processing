---
# Default workflow for assigning calibrations to data days.
# The calibration data is loaded to a local shared volume.
# The calibration assignment module processes whatever is in the volume.
# The final output is written to a specified prefix in the output bucket.
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: calibration-assignment
spec:
  schedules:
  - "* * 31 2 *"
  concurrencyPolicy: Forbid
  workflowSpec:
    entrypoint: main
    # This block for granting setting the group permissions on emptyDir volumes
    securityContext:
      fsGroup: 1001
      fsGroupChangePolicy: OnRootMismatch
    arguments:
      parameters:
      - name: run_date
        value: "{{=sprig.date('2006/01/02', workflow.creationTimestamp)}}"
      - name: env_config
        value: calibration-assignment-env
      - name: assignment_config
        valueFrom:
          configMapKeyRef:
            name: calibration-assignment-config
            key: config

    templates:
    # Loop over source types and r code config.
    - name: main
      steps:
      - - name: run-step
          template: run
          arguments:
            parameters:
            - name: source_type
              value: "{{item.key}}"
            - name: r_args
              value: "{{item.value}}"
          withParam: "{{workflow.parameters.assignment_config}}"

    # Process each source type.
    - name: run
      inputs:
        parameters:

        # Required input parameters.
        - name: source_type
        - name: r_args

        # Define constant paths for use across container mounted volumes.
        - name: in_path
          value: /inputs
        - name: out_path
          value: /outputs
        - name: tmp_path
          value: /tmp
        - name: error_path
          value: /errors
        - name: calibration_dir
          value: calibrations
        - name: data_year_dir
          value: data_year

        # ConfigMap constants.
        - name: log_level
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: log_level

        # Calibration source bucket
        - name: calibration_bucket
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: calibration_bucket
        - name: calibration_bucket_prefix
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: calibration_bucket_prefix

        # Output bucket
        - name: output_bucket
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: output_bucket
        - name: output_bucket_prefix
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: output_bucket_prefix

        # Data year
        - name: data_year_file
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: data_year_file
        - name: data_year_bucket
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: data_year_bucket
        - name: data_year_bucket_prefix
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: data_year_bucket_prefix

        # Manifests
        - name: manifest_file_name
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: manifest_file_name
        - name: change_manifest_file_name
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: change_manifest_file_name

        # R Code
        - name: parallelization_internal
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: parallelization_internal
        - name: relative_path_index
          valueFrom:
            configMapKeyRef:
              name: "{{workflow.parameters.env_config}}"
              key: relative_path_index

        artifacts: 
        - name: data-year
          path: "{{inputs.parameters.in_path}}/{{inputs.parameters.data_year_dir}}/{{inputs.parameters.data_year_file}}"
          gcs:
            bucket: "{{inputs.parameters.data_year_bucket}}"
            key: "{{inputs.parameters.data_year_bucket_prefix}}"

      volumes:
      - name: in-vol
        emptyDir: { }
      - name: out-vol
        emptyDir: { }
      - name: tmp-vol
        emptyDir: { }
      - name: err-vol
        emptyDir: { }
      # A writable volume to run gcloud command, which tries to write to HOME/config
      - name: gcloud-volume
        emptyDir: {}

      containerSet:
        # Must mount volumes to make them accessible to all containers 
        # (otherwise they are only accessible to the "main" container).

        volumeMounts:
        - name: in-vol
          mountPath: "{{inputs.parameters.in_path}}"
        - name: out-vol
          mountPath: "{{inputs.parameters.out_path}}"
        - name: tmp-vol
          mountPath: "{{inputs.parameters.tmp_path}}"  # Required to run R code that creates a temp directory
        - name: err-vol
          mountPath: "{{inputs.parameters.error_path}}"
        - name: gcloud-volume
          mountPath: /mnt/gcloud

        containers:
        # Download the calibration files
        - name: calibration-file-download
          image: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
          securityContext:
            runAsUser: 1001 
            runAsGroup: 1001
          resources:
            requests:
              memory: 2Gi
              cpu: 1
            limits:
              memory: 3Gi
              cpu: 1.25
          command: 
          - sh 
          - -c
          - |
            export HOME=/mnt/gcloud

            bucket={{inputs.parameters.calibration_bucket}}
            prefix={{inputs.parameters.calibration_bucket_prefix}}
            source_type={{inputs.parameters.source_type}}
            in_dir={{inputs.parameters.in_path}}
            calibration_dir={{inputs.parameters.calibration_dir}}

            url="gs://${bucket}/${prefix}/${source_type}/"

            download_dir=${in_dir}/${calibration_dir}

            mkdir -p ${download_dir}
            cd ${download_dir}
            echo "Copying files from GCS bucket..."
            if gcloud storage cp --recursive $url ${download_dir}/; then
              echo "Copy succeeded."
            else
              echo "No matching files for $url (or another error occurred). Continuing..."
            fi

        # Assign the calibrations
        - name: calibration-assignment
          dependencies:
          - calibration-file-download
          image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-cal-asgn:v2.0.7
          # Need to run as user 1001 because the gcs input is loaded as 
          # this user and group, as controlled by the helm chart.
          # Note that the image sets the user and group as 9999, but this 
          # doesn't seem to matter because we don't need write priveleges in the container.
          securityContext:
            runAsUser: 1001 
            runAsGroup: 1001
          # NOTE: The individual resources requested for each container don't really matter; 
          # it's the sum total that is actually available to each container, 
          # so long as they run in sequence. Any containers running in parallel must have 
          # the sum of their resource needs available.
          resources:
            requests:
              memory: 2Gi
              cpu: 1
            limits:
              memory: 3Gi
              cpu: 1.25
          env:
          - name: DIR_IN
            value: "{{inputs.parameters.in_path}}/{{inputs.parameters.calibration_dir}}"
          - name: DIR_OUT
            value: "{{inputs.parameters.out_path}}"
          - name: ERR_PATH
            value: "{{inputs.parameters.error_path}}"
          - name: RELATIVE_PATH_INDEX
            value: "{{inputs.parameters.relative_path_index}}"
          - name: LOG_LEVEL
            value: "{{inputs.parameters.log_level}}"
          - name: R_ARGS
            value: "{{inputs.parameters.r_args}}"
          - name: FILE_YEAR
            value: "{{inputs.parameters.in_path}}/{{inputs.parameters.data_year_dir}}/data_year_2026.txt"
          - name: PARALLELIZATION_INTERNAL
            value: "{{inputs.parameters.parallelization_internal}}"
          command:
          - bash
          - -c
          - |
            # Use bash-scrict mode. See http://redsymbol.net/articles/unofficial-bash-strict-mode/
            set -euo pipefail
            IFS=$'\n\t'
            eval "Rscript ./flow.cal.asgn.R $R_ARGS"

        # Generate the change manifest and save to a bucket
        - name: main
          dependencies:
          - calibration-assignment
          image: us-central1-docker.pkg.dev/neon-shared-service/bei/neon-argo-workflows-data-change-manifest:sha-461c14b
          resources:
            requests:
              memory: 300Mi
              cpu: 100m
            limits:
              memory: 500Mi
              cpu: 1
          env:
          - name: SOURCE_PATH
            value: "{{inputs.parameters.out_path}}"
          - name: SOURCE_TYPE
            value: "{{inputs.parameters.source_type}}"
          - name: RUN_DATE
            value: "{{workflow.parameters.run_date}}"
          - name: OUTPUT_PATH
            value: "{{inputs.parameters.tmp_path}}"
          - name: MANIFEST_BUCKET
            value: "{{inputs.parameters.output_bucket}}"
          - name: MANIFEST_BUCKET_PREFIX
            value: "{{inputs.parameters.output_bucket_prefix}}"
          - name: MANIFEST_FILE_NAME
            value: "{{inputs.parameters.manifest_file_name}}"
          - name: CHANGE_MANIFEST_FILE_NAME
            value: "{{inputs.parameters.change_manifest_file_name}}"
          - name: LOGURU_LEVEL
            value: "{{inputs.parameters.log_level}}"
          command: 
          - sh
          - -c
          - python3 /app/main.py
