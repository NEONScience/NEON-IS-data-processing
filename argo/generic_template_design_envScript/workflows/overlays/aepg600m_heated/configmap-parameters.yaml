apiVersion: v1
kind: ConfigMap
metadata:
  name: calibration-group-convert-parameter-config
  labels:
    workflows.argoproj.io/configmap-type: Parameter
data:
  # Schema repository URLs and revisions
  schema-repo-eng-url: git@github.com:BattelleEcology/neon-avro-schemas.git
  schema-repo-eng-revision: develop
  schema-repo-sci-url: https://github.com/NEONScience/NEON-IS-avro-schemas.git
  schema-repo-sci-revision: master
  
  config-env.yaml: |
    ---
    # Structured configuration for AEPG600M_HEATED sensor calibration group and convert workflow
    # All of the key-value pairs in each top-level section will be loadable from an env file named <section>.env (e.g. workflow.env).

    # Environment vars for all processes in the workflow
    workflow:
      LOG_LEVEL: INFO
      ERR_PATH: /data/errored_datums
    
    # Environment vars for loading data
    load-data:
      L0_BUCKET_NAME: neon-dev-l0-ingest
      L0_BUCKET_VERSION_PATH: v2
      CAL_BUCKET_NAME: neon-dev-argo-workflow-test
      CAL_BUCKET_PREFIX: aepg600m_heated_calibration_assignment
      MANIFEST_SOURCE_TYPE_INDEX: 0
      MANIFEST_YEAR_INDEX: 1
      MANIFEST_MONTH_INDEX: 2
      MANIFEST_DAY_INDEX: 3
      MANIFEST_SOURCE_ID_INDEX: 4
      OUT_PATH: /data/DATA_PATH_ARCHIVE
      OUT_PATH_CAL: /data/CALIBRATION_PATH

    # Environment vars for processing
    processing:
      # Filter-joiner configuration for merging data and calibrations
      CONFIG: |
        ---
        input_paths:
        - path:
            name: DATA_PATH_ARCHIVE
            glob_pattern: /data/DATA_PATH_ARCHIVE/aepg600m_heated/*/*/*/*/**
            join_indices: [7]
            outer_join: true
        - path:
            name: CALIBRATION_PATH
            glob_pattern: /data/CALIBRATION_PATH/aepg600m_heated/*/*/*/*/**
            join_indices: [7]
            outer_join: true
      
      RELATIVE_PATH_INDEX: 3
      LINK_TYPE: SYMLINK
      PARALLELISM_INTERNAL: 3
      
      OUT_PATH_JOINER: /data/data_cal_joined
      OUT_PATH_KAFKA_COMB: /data/kafka_combined
      OUT_PATH_CAL_CONV: /data/aepg600m_heated_calibration_group_and_convert
      
      # R arguments for kafka combine step
      KFKA_COMB_R_ARGS: >-
        "DirIn=$OUT_PATH_JOINER"
        "DirOut=$OUT_PATH_KAFKA_COMB"
        "DirErr=$ERR_PATH"
        "FileSchmL0=/data/schemas-eng/schemas/aepg600m/aepg600m_heated.avsc"
        "DirSubCopy=calibration"
      
      # R arguments for calibration conversion step
      CAL_CONV_R_ARGS: >-
        "DirIn=$OUT_PATH_KAFKA_COMB"
        "DirOut=$OUT_PATH_CAL_CONV"
        "DirErr=$ERR_PATH"
        "FileSchmData=/data/schemas-sci/avro_schemas/aepg600m/aepg600m_heated_calibrated.avsc"
        "FileSchmQf=/data/schemas-sci/avro_schemas/aepg600m/flags_calibration_aepg600m.avsc"
        "ConvFuncTerm1=def.cal.conv.poly.aepg600m:strain_gauge1_frequency_raw"
        "ConvFuncTerm2=def.cal.conv.poly.aepg600m:strain_gauge2_frequency_raw"
        "ConvFuncTerm3=def.cal.conv.poly.aepg600m:strain_gauge3_frequency_raw"
        "TermQf=strain_gauge1_frequency_raw|strain_gauge2_frequency_raw|strain_gauge3_frequency_raw"
    
    # Environment vars for data upload
    data-upload:
      OUT_PATH: /data/aepg600m_heated_calibration_group_and_convert
      OUTPUT_BUCKET_NAME: neon-dev-argo-workflow-test
      OUTPUT_BUCKET_PREFIX: aepg600m_heated_calibration_group_and_convert
