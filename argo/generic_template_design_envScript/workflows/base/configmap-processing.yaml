apiVersion: v1
kind: ConfigMap
metadata:
  name: calibration-group-convert-processing-config
  labels:
    workflows.argoproj.io/configmap-type: Parameter
data:
  processing-instructions.yaml: |
    ---
    # Commands executed by the processing container.
    # Blank lines are preserved in the rendered sourceable script.
    commands: |
      # Source the normalized configurations
      source /config/config-out/workflow.env
      source /config/config-out/processing.env
      
      # Join files from the archive and from Kafka
      export OUT_PATH=$OUT_PATH_JOINER
      python3 -m filter_joiner.filter_joiner_main

      # Combine data from Kafka and the archive
      eval "Rscript ./flow.kfka.comb.R $KFKA_COMB_R_ARGS"

      # Run calibration conversion module
      eval "Rscript ./flow.cal.conv.R $CAL_CONV_R_ARGS"
