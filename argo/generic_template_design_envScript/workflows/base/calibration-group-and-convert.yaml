# Calibration group and convert workflow template
# This template is platform-agnostic and sensor-agnostic.
# Sensor-specific configuration is injected via a mounted ConfigMap.
# An init container creates executable env var configurations for consumption by workflow containers.

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: calibration-group-and-convert
spec:
  entrypoint: run
  securityContext:
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch

  arguments:
    parameters:
      - name: datum-manifest
        value: |
          {"paths": ["cmp22/2025/10/01/11185","cmp22/2026/05/01/11185","cmp22/2026/05/02/11183"]}
      - name: config-map-parameter-name
        value: calibration-group-convert-parameter-config
      - name: config-map-processing-name
        value: calibration-group-convert-processing-config

  templates:
    - name: run
      volumes:
        - name: config-env-vol
          configMap:
            name: "{{workflow.parameters.config-map-parameter-name}}"
        - name: config-processing-vol
          configMap:
            name: "{{workflow.parameters.config-map-processing-name}}"
        - name: config-output-vol
          emptyDir: { }
        - name: data-vol
          emptyDir: { }
        - name: tmp-vol
          emptyDir: { }

      inputs:
        parameters:
          - name: datum-manifest
          - name: config-map-parameter-name
          - name: config-map-processing-name
          - name: schema-repo-eng-url
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.config-map-parameter-name}}"
                key: schema-repo-eng-url
          - name: schema-repo-eng-revision
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.config-map-parameter-name}}"
                key: schema-repo-eng-revision
          - name: schema-repo-sci-url
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.config-map-parameter-name}}"
                key: schema-repo-sci-url
          - name: schema-repo-sci-revision
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.config-map-parameter-name}}"
                key: schema-repo-sci-revision
        artifacts:
          - name: schemas-eng
            path: /data/schemas-eng
            git:
              repo: "{{inputs.parameters.schema-repo-eng-url}}"
              revision: "{{inputs.parameters.schema-repo-eng-revision}}"
              depth: 1
              sshPrivateKeySecret:
                name: neon-avro-schemas-secret-readonly
                key: sshPrivateKey
          - name: schemas-sci
            path: /data/schemas-sci
            git:
              repo: "{{inputs.parameters.schema-repo-sci-url}}"
              revision: "{{inputs.parameters.schema-repo-sci-revision}}"
              depth: 1

      initContainers:
        # This container normalizes the configuration from the mounted ConfigMap
        # into environment variables and config files that the workflow containers expect.
        - name: config-env-file-creator
          image: "us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-cfg-env-file-crea:sha-a0b5cd7"
          volumeMounts:
            - name: config-env-vol
              mountPath: /config/config-env-in
            - name: config-output-vol
              mountPath: /config/config-out
          command:
            - python3
            - /usr/src/app/config_file_creator/config-env-file-creator.py
          env:
            - name: CONFIG_INPUT_FILE
              value: /config/config-env-in/config-env.yaml
            - name: CONFIG_OUTPUT_DIR
              value: /config/config-out
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

        # This container renders sourceable processing instructions from YAML.
        - name: processing-instructions-file-creator
          image: "us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-cfg-env-file-crea:sha-a0b5cd7"
          volumeMounts:
            - name: config-processing-vol
              mountPath: /config/processing-in
            - name: config-output-vol
              mountPath: /config/config-out
          command:
            - python3
            - /usr/src/app/config_file_creator/processing-instructions-file-creator.py
          env:
            - name: PROCESSING_INPUT_FILE
              value: /config/processing-in/processing-instructions.yaml
            - name: PROCESSING_OUTPUT_FILE
              value: /config/config-out/processing-instructions.sh
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

      containerSet:
        volumeMounts:
          - name: config-env-vol
            mountPath: /config/config-env-in
          - name: config-processing-vol
            mountPath: /config/processing-in
          - name: config-output-vol
            mountPath: /config/config-out
          - name: data-vol
            mountPath: /data
          - name: tmp-vol
            mountPath: /tmp

        containers:
          - name: load-data
            image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-gcs-data:sha-37b2af5
            securityContext:
              runAsUser: 1001
              runAsGroup: 1001
            resources:
              requests:
                memory: "300Mi"
                cpu: "100m"
              limits:
                memory: "500Mi"
                cpu: "1"
            command:
              - bash
              - -c
              - |
                set -euo pipefail
                IFS=$'\n\t'

                # Source the normalized configurations
                source /config/config-out/workflow.env
                source /config/config-out/load-data.env

                # Get L0 data from GCS
                python3 -m l0_gcs_loader_by_manifest

                # Get assigned calibrations
                CAL_REPO="${CAL_BUCKET_PREFIX#/}"
                CAL_REPO="${CAL_REPO%/}"
                CAL_ROOT=":gcs://${CAL_BUCKET_NAME}/${CAL_REPO}"

                mkdir -p "$OUT_PATH_CAL"

                echo "Datum Manifest:        $MANIFEST"
                echo "Cal Root:              $CAL_ROOT"
                echo "Cal Dest:              $OUT_PATH_CAL"
                echo

                for datum_path in $(printf '%s' "$MANIFEST" | jq -r '.paths[]'); do
                  echo "DATUM: $datum_path"
                  echo "Getting calibration datum: $datum_path"

                  src="${CAL_ROOT}/${datum_path}"
                  dst="${OUT_PATH_CAL}/${datum_path}"
                  mkdir -p "$dst"

                  rclone \
                    --no-check-dest \
                    --copy-links \
                    --gcs-bucket-policy-only \
                    --gcs-no-check-bucket \
                    copy \
                    --progress \
                    "${src}" "${dst}"
                done

                echo "Done getting data and calibrations."

            env:
              - name: MANIFEST
                value: "{{inputs.parameters.datum-manifest}}"

          - name: processing
            dependencies:
              - load-data
            image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-cal-grp-conv:sha-33f7182
            securityContext:
              runAsUser: 1001
              runAsGroup: 1001
            resources:
              requests:
                memory: "700Mi"
                cpu: "1"
              limits:
                memory: "1Gi"
                cpu: "1.25"
            command:
              - bash
              - -c
              - |
                set -euo pipefail
                IFS=$'\n\t'

                # Source the processing instructions
                source /config/config-out/processing-instructions.sh

          - name: main
            dependencies:
              - processing
            image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-gcs-data:v1.0.0
            securityContext:
              runAsUser: 1001
              runAsGroup: 1001
            resources:
              requests:
                memory: "300Mi"
                cpu: "100m"
              limits:
                memory: "500Mi"
                cpu: "1"
            command:
              - bash
              - -c
              - |
                set -euo pipefail
                IFS=$'\n\t'

                # Source the normalized configuration
                source /config/config-out/workflow.env
                source /config/config-out/data-upload.env

                # Export data to bucket
                if [[ -d "$OUT_PATH" ]]; then
                  linkdir=$(mktemp -d)
                  shopt -s globstar
                  out_parquet_glob="${OUT_PATH}/**/*.*"
                  echo "Linking output files to ${linkdir}"
                  for f in $out_parquet_glob; do
                    [[ "$f" =~ ^$OUT_PATH/(.*)$ ]]
                    rel_path="${BASH_REMATCH[1]}"
                    fname="${rel_path##*/}"
                    rel_dir="${rel_path%/*}"
                    outdir="${linkdir}/${OUTPUT_BUCKET_PREFIX}/${rel_dir}"
                    mkdir -p "${outdir}"
                    ln -s "${f}" "${outdir}"
                  done

                  echo "Syncing files to bucket"
                  rclone \
                    --copy-links \
                    --gcs-bucket-policy-only \
                    copy \
                    "${linkdir}/${OUTPUT_BUCKET_PREFIX}" \
                    ":gcs://${OUTPUT_BUCKET_NAME}/${OUTPUT_BUCKET_PREFIX}"

                  echo "Removing temporary files"
                  rm -rf $linkdir

                else
                  echo "No output found."
                fi
