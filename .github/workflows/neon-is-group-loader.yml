name: "DEV group_loader to nonprod"

on:
  workflow_dispatch:
    tags:
      - "v*.*.*"
  
env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN }}
  # Use github and google registries
  GHCR_REGISTRY: ghcr.io
  GCP_ARTIFACT_HOST: ${{ vars.SHARED_WIF_LOCATON }}-docker.pkg.dev
  GCP_REGISTRY: ${{ vars.SHARED_WIF_LOCATON }}-docker.pkg.dev/${{ vars.SHARED_WIF_PROJECT }}/${{ vars.SHARED_WIF_REPO }}
  GCP_PROVIDER:  ${{ vars.SHARED_WIF_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.SHARED_WIF_SERVICE_ACCOUNT }}
  GHCR_NS: battelleecology
  #GHCR_NS: NEONScience
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  # IMAGE_NAME: ${{ github.repository }}
  # Get just the repo name from the event, i.e., NEON-IS-data-processing
  REPO_NAME: ${{ github.event.repository.name }}
  # IS module name
  MODULE_NAME: group_loader
  IMAGE_NAME: neon-is-group-loader
  # git tag
  # semver

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
        contents: 'write'
        id-token: 'write'
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4.1.4"
        with:
          fetch-depth: '0'

      - name: Get short SHA
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        
      - name: Get semver
        run: echo "semver=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV

      - name: Get version parts
        shell: bash
        run: |
          echo "{LAST_TAG}={$(git describe --tags $(git rev-list --tags --max-count=1))}" >> "$GITHUB_ENV" 
          echo "{MAJOR}={$(echo $LAST_TAG | awk -F "." '{printf "%0" length($1) $1}')}" >> "$GITHUB_ENV"
          echo "{MINOR}={$(echo $LAST_TAG | awk -F "." '{print $2}')}" >> "$GITHUB_ENV"
          echo "{PATCH}={$(echo $LAST_TAG | awk -F "." '{print $3}')}" >> "$GITHUB_ENV"

      - name: Get next tag
        run:  echo "{NEW_TAG}={$MAJOR.$MINOR.$(($PATCH + 1))}" >> "$GITHUB_ENV"

      - name: Build push and update
        uses: ./.github/actions/build-push-update
        with:
            image-tag: "${short_sha}"
  #          sem-ver: "${semver}"
            