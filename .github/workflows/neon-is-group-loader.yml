name: "DEV group_loader to nonprod semver"

on:
  workflow_dispatch:
    tags:
      - "v*.*.*"
  
env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN }}
  # Use github and google registries
  GHCR_REGISTRY: ghcr.io
  GCP_ARTIFACT_HOST: ${{ vars.SHARED_WIF_LOCATON }}-docker.pkg.dev
  GCP_REGISTRY: ${{ vars.SHARED_WIF_LOCATON }}-docker.pkg.dev/${{ vars.SHARED_WIF_PROJECT }}/${{ vars.SHARED_WIF_REPO }}
  GCP_PROVIDER:  ${{ vars.SHARED_WIF_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.SHARED_WIF_SERVICE_ACCOUNT }}
  GHCR_NS: battelleecology
  #GHCR_NS: NEONScience
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  # IMAGE_NAME: ${{ github.repository }}
  # Get just the repo name from the event, i.e., NEON-IS-data-processing
  REPO_NAME: ${{ github.event.repository.name }}
  # IS module name
  MODULE_NAME: group_loader
  IMAGE_NAME: neon-is-group-loader
  # git tag
  # semver

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
        contents: 'write'
        id-token: 'write'
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4.1.4"
        with:
          fetch-depth: '0'

      - name: Get short SHA
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        
      - name: Get semver
        shell: bash
        run: |
          echo "LAST_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_ENV
          echo "MAJOR=$LAST_TAG | awk -F "." '{print $1}'" >> $GITHUB_ENV
          echo "MINOR=$LAST_TAG | awk -F "." '{print $2}" >> $GITHUB_ENV
          echo "PATCH=$$LAST_TAG | awk -F "." '{print $3}'">> $GITHUB_ENV
          echo $MAJOR
          echo $MINOR
          echo "NEW_TAG="$MAJOR.$MINOR.$(($PATCH + 1))" >> $GITHUB_ENV
          echo $LAST_TAG
          echo $NEW_TAG
        
      - name: Build push and update
        uses: ./.github/actions/build-push-update-autotag-semver
        with:
            image-tag: "${short_sha}"
  #          sem-ver: "${semver}"
            