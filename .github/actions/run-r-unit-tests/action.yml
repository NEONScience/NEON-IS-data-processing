      - name: Build Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
            context: ./
            file: ${{ env.MODULE_PATH }}/Dockerfile
            push: false
            tags: ${{ env.IMAGE_NAME }}:${{ inputs.image-tag }}
  
      - name: Run unit tests inside Docker container
        shell: bash
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ env.IMAGE_NAME }}:${{ inputs.image-tag }} \
            Rscript -e 'devtools::test(pkg="${{ env.MODULE_PATH }}");'

