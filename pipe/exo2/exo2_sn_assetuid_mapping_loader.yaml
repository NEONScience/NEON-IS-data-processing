---
pipeline:
  name: exo2_sn_assetuid_mapping_loader
transform:
  image_pull_secrets:
  - battelleecology-quay-read-all-pull-secret
  image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-sn-asset-map:sha-f8b9591
  cmd:
  - /bin/bash
  stdin:
  - '#!/bin/bash'
  - python3 -m sn_assetuid_mapping_loader.sn_assetuid_mapping_loader
  env:
    OUTPUT_PATH: /pfs/out
    REGION: cert
    SOURCE_TYPE: exo2
    CDSWEBAPP_URL: http://den-certcdsllb-1.ci.neoninternal.org/cdsWebApp/
    LOG_LEVEL: DEBUG
  secrets:
  - name: pdr-secret
    mount_path: /var/db_secret
  - name: cds-secret
    mount_path: /var/cds_secret
input:
  pfs:
    repo: exo2_cron_daily_and_date_control_tick
    glob: /*
    empty_files: true
autoscaling: true
resource_requests:
  memory: 100M
  cpu: 0.05
resource_limits:
  memory: 300M
  cpu: 0.5
sidecar_resource_requests:
  memory: 3G
  cpu: 0.5
scheduling_spec:
  node_selector:
    cloud.google.com/compute-class: pach-pipeline-class
