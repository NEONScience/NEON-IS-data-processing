---
pipeline:
  name: exo2_location_loader
transform:
  image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-loc-loader:v1.0.0
  cmd:
  - /bin/bash
  stdin:
  - '#!/bin/bash'
  - export SOURCE_TYPE=$SOURCE_TYPE_1
  - python3 -m location_loader.location_loader_main
  - export SOURCE_TYPE=$SOURCE_TYPE_2
  - python3 -m location_loader.location_loader_main
  - export SOURCE_TYPE=$SOURCE_TYPE_3
  - python3 -m location_loader.location_loader_main
  - export SOURCE_TYPE=$SOURCE_TYPE_4
  - python3 -m location_loader.location_loader_main
  - export SOURCE_TYPE=$SOURCE_TYPE_5
  - python3 -m location_loader.location_loader_main
  - export SOURCE_TYPE=$SOURCE_TYPE_6
  - python3 -m location_loader.location_loader_main
  - export SOURCE_TYPE=$SOURCE_TYPE_7
  - python3 -m location_loader.location_loader_main
  
  env:
    LOCATION_TYPE: CONFIG
    SOURCE_TYPE_1: exo2
    SOURCE_TYPE_2: exo2conductivity
    SOURCE_TYPE_3: exo2turbidity
    SOURCE_TYPE_4: exo2fdom
    SOURCE_TYPE_5: exo2phorp
    SOURCE_TYPE_6: exo2dissolvedoxygen
    SOURCE_TYPE_7: exo2algae
    OUT_PATH: /pfs/out    
    # ERR_PATH can be changed, it is user specified
    ERR_PATH: /pfs/out/errored_datums
    LOG_LEVEL: INFO
  secrets:
  - name: pdr-secret
    mount_path: /var/db_secret
input:
  pfs:
    repo: exo2_all_probes_cron_daily_and_date_control_tick
    glob: /*
    empty_files: true
autoscaling: true
resource_requests:
  memory: 100M
  cpu: 0.1
resource_limits:
  memory: 300M
  cpu: 0.5
sidecar_resource_requests:
  memory: 500M
  cpu: 0.1
scheduling_spec:
  node_selector:
    cloud.google.com/compute-class: pach-pipeline-class
    