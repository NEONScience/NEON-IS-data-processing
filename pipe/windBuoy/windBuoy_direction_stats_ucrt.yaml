---
pipeline:
  name: windBuoy_direction_stats_ucrt
transform:
  image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-wind-buoy-direction-stats-ucrt:sha-cddadfb
  cmd:
  - sh
  - "-c"
  - |-
    /bin/bash <<'EOF'
    # Use bash-scrict mode. See http://redsymbol.net/articles/unofficial-bash-strict-mode/
    set -euo pipefail
    IFS=$'\n\t'

    echo "=== Debugging input paths ==="
    echo "--- /pfs/DATA_PATH ---"
    find /pfs/DATA_PATH -mindepth 1 | sort || echo "DATA_PATH not found or empty"
    echo "--- /pfs/THRESHOLD_PATH ---"
    find /pfs/THRESHOLD_PATH -mindepth 1 | sort || echo "THRESHOLD_PATH not found or empty"
    echo "--- /pfs/UNCERTAINTY_PATH ---"
    find /pfs/UNCERTAINTY_PATH -mindepth 1 | sort || echo "UNCERTAINTY_PATH not found or empty"
    echo "=== End debugging input paths ==="
    
    # Run filter-joiner for data (using environment variables below as input parameters)
    python3 -m filter_joiner.filter_joiner_main

    EOF
  env:
    # Environment variables for filter-joiner.
    CONFIG: |
      ---
      # Configuration for filter-joiner module
      # In Pachyderm root will be index 0, 'pfs' index 1, and the repo name index 2.
      # Metadata indices will typically begin at index 3.
      input_paths:
        - path:
            name: DATA_PATH
            glob_pattern: /pfs/DATA_PATH/*/*/*/*/**
            # Join on named location (already joined below by source type and day)
            join_indices: [8]
        - path:
            name: UNCERTAINTY_PATH
            glob_pattern: /pfs/UNCERTAINTY_PATH/*/*/*/*/rmyoung/*/uncertainty*/**
            # Join on named location (already joined below by source type and day)
            join_indices: [8]
            outer_join: true
    LOG_LEVEL: DEBUG
    OUT_PATH: /pfs/out
    RELATIVE_PATH_INDEX: "3" # Must be consistent across inputs 
    LINK_TYPE: COPY # options are COPY or SYMLINK. 
    PARALLELIZATION_INTERNAL: '3'
input:
  join:    
  - pfs:
      name: DATA_PATH
      repo: windBuoy_analyze_pad_and_qaqc_plau
      glob: /(*)/(*)/(*)/(*)
      joinOn: $1/$2/$3/$4
      outer_join: false
      empty_files: false # Make sure to use false if LINK_TYPE=COPY.
  - pfs:
      name: UNCERTAINTY_PATH
      repo: windBuoy_group_path
      glob: /(*)/(*)/(*)/(*)
      joinOn: $1/$2/$3/$4
      outer_join: true
      empty_files: false # Make sure to use false if LINK_TYPE=COPY.
parallelism_spec:
  constant: 5
autoscaling: true
resource_requests:
  memory: 1.2G
  cpu: 1.3
resource_limits:
  memory: 2G
  cpu: 2
sidecar_resource_requests:
  memory: 1G
  cpu: 0.5
datum_set_spec:
  number: 5
scheduling_spec:
  node_selector:
    cloud.google.com/compute-class: pach-pipeline-class
