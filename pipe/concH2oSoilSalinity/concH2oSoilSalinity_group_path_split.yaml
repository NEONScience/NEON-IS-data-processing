---
pipeline:
  name: concH2oSoilSalinity_group_path_split
transform:
  image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-group-path:v1.0.1
  cmd:
  - /bin/bash
  stdin:
  - '#!/bin/bash'
  - python3 -m group_path.group_path_main
  env:
    GROUP: conc-h2o-soil-salinity-split_
    LOG_LEVEL: DEBUG
    OUT_PATH: /pfs/out    
    # ERR_PATH can be changed, it is user specified
    ERR_PATH: /pfs/out/errored_datums
    # group_assignment_split path: /pfs/GROUP_ASSIGNMENT_PATH/conc-h2o-soil-salinity-split/YEAR/MONTH/DAY/CFGLOC/group/CFGLOC.json
    GROUP_ASSIGNMENT_YEAR_INDEX: '4'
    GROUP_ASSIGNMENT_MONTH_INDEX: '5'
    GROUP_ASSIGNMENT_DAY_INDEX: '6'
    GROUP_ASSIGNMENT_MEMBER_INDEX: '7'
    GROUP_ASSIGNMENT_DATA_TYPE_INDEX: '8'
    # group_focus (stats/QM) path: /pfs/GROUP_FOCUS_PATH/YEAR/MONTH/DAY/original_group/enviroscan/CFGLOC/stats_or_qm/file
    # GROUP_FOCUS_GROUP_INDEX points to CFGLOC (index 8) to match MEMBER_INDEX above
    GROUP_FOCUS_YEAR_INDEX: '3'
    GROUP_FOCUS_MONTH_INDEX: '4'
    GROUP_FOCUS_DAY_INDEX: '5'
    GROUP_FOCUS_GROUP_INDEX: '8'
input:
  join:
  - pfs:
      # name must be GROUP_ASSIGNMENT_PATH
      name: GROUP_ASSIGNMENT_PATH
      repo: concH2oSoilSalinity_group_assignment_split
      glob: /conc-h2o-soil-salinity-split/(*/*/*)
      joinOn: $1
  - pfs:
      # name must be GROUP_FOCUS_PATH
      name: GROUP_FOCUS_PATH
      repo: concH2oSoilSalinity_qm_stats_comb_test
      glob: /(*/*/*)
      joinOn: $1
parallelism_spec:
  constant: 5
autoscaling: true
resource_requests:
  memory: 600M
  cpu: 0.4
resource_limits:
  memory: 2G
  cpu: 1.2
sidecar_resource_requests:
  memory: 3G
  cpu: 1
datum_set_spec:
  number: 1
scheduling_spec:
  node_selector:
    cloud.google.com/compute-class: pach-pipeline-class
