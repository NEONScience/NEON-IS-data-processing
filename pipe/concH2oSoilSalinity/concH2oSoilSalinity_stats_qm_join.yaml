---
pipeline:
  name: concH2oSoilSalinity_stats_qm_join
transform:
  image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-qaqc-qm-grp:v2.1.3
  cmd:
  - /bin/bash
  stdin:
  - '#!/bin/bash'
  - python3 -m filter_joiner.filter_joiner_main
  env:
    CONFIG: |
      ---
      # In Pachyderm root will be index 0, 'pfs' index 1, and the repo name index 2.
      # Metadata indices will typically begin at index 3.
      # stats/QM path: /pfs/STATS_PATH/YEAR/MONTH/DAY/original_group/enviroscan/CFGLOC/stats_or_qm/file
      #                 idx                3     4     5    6              7        8      9            10
      input_paths:
        - path:
            name: STATS_PATH
            glob_pattern: /pfs/STATS_PATH/*/*/*/*/**
            join_indices: [3,4,5,6]
        - path:
            name: QM_PATH
            glob_pattern: /pfs/QM_PATH/*/*/*/*/**
            join_indices: [3,4,5,6]
    OUT_PATH: /pfs/out
    LOG_LEVEL: INFO
    RELATIVE_PATH_INDEX: "3"
    LINK_TYPE: COPY
input:
  join:
  - pfs:
      name: STATS_PATH
      repo: concH2oSoilSalinity_stats_group_and_compute
      glob: /(*/*/*)
      joinOn: $1
  - pfs:
      name: QM_PATH
      repo: concH2oSoilSalinity_qm_group_and_compute
      glob: /(*/*/*)
      joinOn: $1
parallelism_spec:
  constant: 5
autoscaling: true
resource_requests:
  memory: 600M
  cpu: 0.4
resource_limits:
  memory: 2G
  cpu: 1.2
sidecar_resource_requests:
  memory: 3G
  cpu: 1
datum_set_spec:
  number: 1
scheduling_spec:
  node_selector:
    cloud.google.com/compute-class: pach-pipeline-class
