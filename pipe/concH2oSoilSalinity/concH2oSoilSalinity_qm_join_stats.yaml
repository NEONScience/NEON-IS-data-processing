  env:
    # Environment variables for step 1 filter-joiner (joins QAQC plausibility + regularized flags)
    CONFIG: |
      ---
      # In Pachyderm root will be index 0, 'pfs' index 1, and the repo name index 2.
      # Metadata indices will typically begin at index 3.
      input_paths:
        - path:
            name: QAQC_PLAUSIBILITY_PATH
            # Filter for flags directory
            glob_pattern: /pfs/QAQC_PLAUSIBILITY_PATH/*/*/*/*/*/*/flags/**
            # Join on named location (already joined below by day)
            join_indices: [6]
        - path:
            name: REGULARIZED_FLAGS_PATH
            # Filter for flags directory
            glob_pattern: /pfs/REGULARIZED_FLAGS_PATH/*/*/*/*/enviroscan/*/flags/**
            # Join on named location (already joined below by day)
            join_indices: [6]
    OUT_PATH: /tmp/pfs/filter_joined
    LOG_LEVEL: INFO
    RELATIVE_PATH_INDEX: "3"
    LINK_TYPE: COPY
    PARALLELIZATION_INTERNAL: '3'
input:
  cross:
  - pfs:
      name: FILE_SCHEMA_QM
      repo: concH2oSoilSalinity_avro_schemas
      glob: /concH2oSoilSalinity/concH2oSoilSalinity_dp01_quality_metrics.avsc
  - join:
    - pfs:
        name: QAQC_PLAUSIBILITY_PATH
        repo: concH2oSoilSalinity_analyze_pad_qaqc_join_custom
        glob: /(*/*/*)
        joinOn: $1
        empty_files: false
    - pfs:
        name: REGULARIZED_FLAGS_PATH
        repo: concH2oSoilSalinity_group_path
        glob: /(*/*/*)
        joinOn: $1
        empty_files: false
    - pfs:
        name: STATS_PATH
        repo: concH2oSoilSalinity_stats_group_and_compute
        glob: /(*/*/*)
        joinOn: $1
        empty_files: false
parallelism_spec:
  constant: 5
autoscaling: true
resource_requests:
  memory: 900M
  cpu: 3.5
resource_limits:
  memory: 2G
  cpu: 5
sidecar_resource_requests:
  memory: 3G
  cpu: 0.5
datum_set_spec:
  number: 1
scheduling_spec:
  node_selector:
    cloud.google.com/compute-class: pach-pipeline-class
