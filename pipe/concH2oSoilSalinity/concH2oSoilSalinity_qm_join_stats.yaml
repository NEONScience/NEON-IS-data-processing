      "GrpQfAlph19=VSICDepth03:VSICDepth03NullQF|VSICDepth03GapQF|VSICDepth03RangeQF|VSICDepth03StepQF|VSICDepth03PersistenceQF|VSICDepth03SpikeQF|VSICDepth03SuspectCalQF|tempTestDepth03QF" \
