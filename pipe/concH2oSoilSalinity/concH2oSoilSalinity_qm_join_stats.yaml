      "GrpQfAlph20=VSICDepth04:VSICDepth04NullQF|VSICDepth04GapQF|VSICDepth04RangeQF|VSICDepth04StepQF|VSICDepth04PersistenceQF|VSICDepth04SpikeQF|VSICDepth04SuspectCalQF|tempTestDepth04QF" \
      "GrpQfBeta20=VSICDepth04:VSICDepth04NullQF|VSICDepth04GapQF|VSICDepth04RangeQF|VSICDepth04StepQF|VSICDepth04PersistenceQF|VSICDepth04SpikeQF|VSICDepth04SuspectCalQF|tempTestDepth04QF" \
      "GrpQfBetaIgnr20=VSICDepth04:VSICDepth04NullQF|VSICDepth04GapQF" \
      "GrpQfAlph21=VSICDepth05:VSICDepth05NullQF|VSICDepth05GapQF|VSICDepth05RangeQF|VSICDepth05StepQF|VSICDepth05PersistenceQF|VSICDepth05SpikeQF|VSICDepth05SuspectCalQF|tempTestDepth05QF" \
      "GrpQfBeta21=VSICDepth05:VSICDepth05NullQF|VSICDepth05GapQF|VSICDepth05RangeQF|VSICDepth05StepQF|VSICDepth05PersistenceQF|VSICDepth05SpikeQF|VSICDepth05SuspectCalQF|tempTestDepth05QF" \
