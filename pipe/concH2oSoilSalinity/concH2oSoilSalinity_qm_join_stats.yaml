  name: concH2oSoilSalinity_qm_join_stats
transform:
  image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-qaqc-qm-grp:v2.1.3
  cmd:
  - sh
  - "-c"
  - |-
    /bin/bash <<'EOF'
    # Use bash-strict mode. See http://redsymbol.net/articles/unofficial-bash-strict-mode/
    set -euo pipefail
    IFS=$'\n\t'

    # Refresh interim directories with each datum (otherwise they persist and cause probs)
    rm -r -f /tmp/pfs/filter_joined
    mkdir -p /tmp/pfs/filter_joined

    rm -r -f /tmp/qm_output
    rm -r -f /tmp/qm_outputCopy
    mkdir -p /tmp/qm_output

    # ---- Step 1: filter-joiner - join QAQC plausibility flags + regularized flags ----
    # Uses CONFIG env variable defined below
    python3 -m filter_joiner.filter_joiner_main

    # ---- Step 2: quality metrics ----
    # Write to /tmp/qm_output (not /pfs/out) so we can join with stats in step 4
    Rscript ./flow.qaqc.qm.R \
      DirIn=/tmp/pfs/filter_joined \
      DirOut=/tmp/qm_output \
      DirErr=/pfs/out/errored_datums \
      "WndwAgr=005|030" \
      "WghtAlphBeta=1|1" \
      FileSchmQm=$FILE_SCHEMA_QM \
      Thsh=0.3 \
      "GrpQfAlph1=VSWCsoilSpecificDepth01:VSWCsoilSpecificDepth01NullQF|VSWCsoilSpecificDepth01GapQF|VSWCsoilSpecificDepth01RangeQF|VSWCsoilSpecificDepth01StepQF|VSWCsoilSpecificDepth01PersistenceQF|VSWCsoilSpecificDepth01SpikeQF|VSWCDepth01SuspectCalQF|tempTestDepth01QF" \
