      "GrpQfBeta15=VSWCfactoryDepth07:VSWCfactoryDepth07NullQF|VSWCfactoryDepth07GapQF|VSWCfactoryDepth07RangeQF|VSWCfactoryDepth07StepQF|VSWCfactoryDepth07PersistenceQF|VSWCfactoryDepth07SpikeQF|VSWCDepth07SuspectCalQF|tempTestDepth07QF" \
      "GrpQfBetaIgnr15=VSWCfactoryDepth07:VSWCfactoryDepth07NullQF|VSWCfactoryDepth07GapQF" \
      "GrpQfAlph16=VSWCfactoryDepth08:VSWCfactoryDepth08NullQF|VSWCfactoryDepth08GapQF|VSWCfactoryDepth08RangeQF|VSWCfactoryDepth08StepQF|VSWCfactoryDepth08PersistenceQF|VSWCfactoryDepth08SpikeQF|VSWCDepth08SuspectCalQF|tempTestDepth08QF" \
      "GrpQfBeta16=VSWCfactoryDepth08:VSWCfactoryDepth08NullQF|VSWCfactoryDepth08GapQF|VSWCfactoryDepth08RangeQF|VSWCfactoryDepth08StepQF|VSWCfactoryDepth08PersistenceQF|VSWCfactoryDepth08SpikeQF|VSWCDepth08SuspectCalQF|tempTestDepth08QF" \
      "GrpQfBetaIgnr16=VSWCfactoryDepth08:VSWCfactoryDepth08NullQF|VSWCfactoryDepth08GapQF" \
      "GrpQfAlph17=VSICDepth01:VSICDepth01NullQF|VSICDepth01GapQF|VSICDepth01RangeQF|VSICDepth01StepQF|VSICDepth01PersistenceQF|VSICDepth01SpikeQF|VSICDepth01SuspectCalQF|tempTestDepth01QF" \
      "GrpQfBeta17=VSICDepth01:VSICDepth01NullQF|VSICDepth01GapQF|VSICDepth01RangeQF|VSICDepth01StepQF|VSICDepth01PersistenceQF|VSICDepth01SpikeQF|VSICDepth01SuspectCalQF|tempTestDepth01QF" \
      "GrpQfBetaIgnr17=VSICDepth01:VSICDepth01NullQF|VSICDepth01GapQF" \
      "GrpQfAlph18=VSICDepth02:VSICDepth02NullQF|VSICDepth02GapQF|VSICDepth02RangeQF|VSICDepth02StepQF|VSICDepth02PersistenceQF|VSICDepth02SpikeQF|VSICDepth02SuspectCalQF|tempTestDepth02QF" \
