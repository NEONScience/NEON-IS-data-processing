      "GrpQfAlph2=VSWCsoilSpecificDepth02:VSWCsoilSpecificDepth02NullQF|VSWCsoilSpecificDepth02GapQF|VSWCsoilSpecificDepth02RangeQF|VSWCsoilSpecificDepth02StepQF|VSWCsoilSpecificDepth02PersistenceQF|VSWCsoilSpecificDepth02SpikeQF|VSWCDepth02SuspectCalQF|tempTestDepth02QF" \
      "GrpQfBeta2=VSWCsoilSpecificDepth02:VSWCsoilSpecificDepth02NullQF|VSWCsoilSpecificDepth02GapQF|VSWCsoilSpecificDepth02RangeQF|VSWCsoilSpecificDepth02StepQF|VSWCsoilSpecificDepth02PersistenceQF|VSWCsoilSpecificDepth02SpikeQF|VSWCDepth02SuspectCalQF|tempTestDepth02QF" \
      "GrpQfBetaIgnr2=VSWCsoilSpecificDepth02:VSWCsoilSpecificDepth02NullQF|VSWCsoilSpecificDepth02GapQF" \
      "GrpQfAlph3=VSWCsoilSpecificDepth03:VSWCsoilSpecificDepth03NullQF|VSWCsoilSpecificDepth03GapQF|VSWCsoilSpecificDepth03RangeQF|VSWCsoilSpecificDepth03StepQF|VSWCsoilSpecificDepth03PersistenceQF|VSWCsoilSpecificDepth03SpikeQF|VSWCDepth03SuspectCalQF|tempTestDepth03QF" \
