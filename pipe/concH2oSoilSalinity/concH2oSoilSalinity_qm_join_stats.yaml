      "GrpQfBeta9=VSWCfactoryDepth01:VSWCfactoryDepth01NullQF|VSWCfactoryDepth01GapQF|VSWCfactoryDepth01RangeQF|VSWCfactoryDepth01StepQF|VSWCfactoryDepth01PersistenceQF|VSWCfactoryDepth01SpikeQF|VSWCDepth01SuspectCalQF|tempTestDepth01QF" \
      "GrpQfBetaIgnr9=VSWCfactoryDepth01:VSWCfactoryDepth01NullQF|VSWCfactoryDepth01GapQF" \
      "GrpQfAlph10=VSWCfactoryDepth02:VSWCfactoryDepth02NullQF|VSWCfactoryDepth02GapQF|VSWCfactoryDepth02RangeQF|VSWCfactoryDepth02StepQF|VSWCfactoryDepth02PersistenceQF|VSWCfactoryDepth02SpikeQF|VSWCDepth02SuspectCalQF|tempTestDepth02QF" \
      "GrpQfBeta10=VSWCfactoryDepth02:VSWCfactoryDepth02NullQF|VSWCfactoryDepth02GapQF|VSWCfactoryDepth02RangeQF|VSWCfactoryDepth02StepQF|VSWCfactoryDepth02PersistenceQF|VSWCfactoryDepth02SpikeQF|VSWCDepth02SuspectCalQF|tempTestDepth02QF" \
      "GrpQfBetaIgnr10=VSWCfactoryDepth02:VSWCfactoryDepth02NullQF|VSWCfactoryDepth02GapQF" \
      "GrpQfAlph11=VSWCfactoryDepth03:VSWCfactoryDepth03NullQF|VSWCfactoryDepth03GapQF|VSWCfactoryDepth03RangeQF|VSWCfactoryDepth03StepQF|VSWCfactoryDepth03PersistenceQF|VSWCfactoryDepth03SpikeQF|VSWCDepth03SuspectCalQF|tempTestDepth03QF" \
      "GrpQfBeta11=VSWCfactoryDepth03:VSWCfactoryDepth03NullQF|VSWCfactoryDepth03GapQF|VSWCfactoryDepth03RangeQF|VSWCfactoryDepth03StepQF|VSWCfactoryDepth03PersistenceQF|VSWCfactoryDepth03SpikeQF|VSWCDepth03SuspectCalQF|tempTestDepth03QF" \
      "GrpQfBetaIgnr11=VSWCfactoryDepth03:VSWCfactoryDepth03NullQF|VSWCfactoryDepth03GapQF" \
      "GrpQfAlph12=VSWCfactoryDepth04:VSWCfactoryDepth04NullQF|VSWCfactoryDepth04GapQF|VSWCfactoryDepth04RangeQF|VSWCfactoryDepth04StepQF|VSWCfactoryDepth04PersistenceQF|VSWCfactoryDepth04SpikeQF|VSWCDepth04SuspectCalQF|tempTestDepth04QF" \
      "GrpQfBeta12=VSWCfactoryDepth04:VSWCfactoryDepth04NullQF|VSWCfactoryDepth04GapQF|VSWCfactoryDepth04RangeQF|VSWCfactoryDepth04StepQF|VSWCfactoryDepth04PersistenceQF|VSWCfactoryDepth04SpikeQF|VSWCDepth04SuspectCalQF|tempTestDepth04QF" \
      "GrpQfBetaIgnr12=VSWCfactoryDepth04:VSWCfactoryDepth04NullQF|VSWCfactoryDepth04GapQF" \
