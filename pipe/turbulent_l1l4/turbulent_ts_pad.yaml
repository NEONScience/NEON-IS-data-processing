---
pipeline:
  name: turbulent_ts_pad
transform:
  image_pull_secrets:
  - battelleecology-quay-read-all-pull-secret
  image: quay.io/battelleecology/timeseries_padder:fe1512ea
  cmd:
  - /bin/bash
  stdin:
  - "#!/bin/bash"
  - python3 -m timeseries_padder.timeseries_padder.constant_pad_main
  env:
    LOG_LEVEL: DEBUG
    OUT_PATH: /pfs/out
    PAD_DIR: data
    YEAR_INDEX: '3'
    MONTH_INDEX: '4'
    DAY_INDEX: '5'
    LOCATION_INDEX: '6'
    DATA_TYPE_INDEX: '7'
    RELATIVE_PATH_INDEX: '3'
    COPY_DIR: 'location'
    WINDOW_SIZE: '4'
    PARALLELIZATION_INTERNAL: '1' # For threshold select module
input:
  pfs:
    name: DATA_PATH
    repo: turbulent_l0p_data
    glob: /*/*/*
parallelism_spec:
  constant: 4
resource_requests:
  memory: 10G
  cpu: 2
resource_limits:
  memory: 20G
  cpu: 4
sidecar_resource_requests:
  memory: 4G
  cpu: 0.3
sidecar_resource_limits:
  memory: 8Gi
  cpu: 1.2
datum_set_spec:
  number: 1
scheduling_spec:
  node_selector:
    cloud.google.com/gke-ephemeral-storage-local-ssd: "true"
    nodepool.neonscience.org/pipeline: "yes"
    cloud.google.com/gke-spot: "true"
pod_spec: |-
  { "tolerations": [
    {
      "key": "nodepool.neonscience.org/pipeline",
      "operator": "Exists"
    },
    {
      "effect": "NoSchedule",
      "key": "cloud.google.com/gke-spot",
      "operator": "Exists"
    }  
  ] }
