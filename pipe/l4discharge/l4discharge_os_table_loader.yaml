---
pipeline:
  name: l4discharge_os_table_loader
transform:
  image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-os-table-loader:v1.0.0
  cmd:
  - sh
  - "-c"
  - |-
    /bin/bash <<'EOF'
    # Use bash-scrict mode. See http://redsymbol.net/articles/unofficial-bash-strict-mode/
    set -euo pipefail
    IFS=$'\n\t'

    # Run os_table_loader    
    export PARTIAL_TABLE_NAME="csd_gapFillingRegression_pub"
    python3 -m os_table_loader.main

    # Run os_table_loader    
    export PARTIAL_TABLE_NAME="csd_gaugeWaterColumnRegression_pub"
    python3 -m os_table_loader.main

    # Run os_table_loader    
    export PARTIAL_TABLE_NAME="csd_dataGapToFillMethodMapping_pub"
    python3 -m os_table_loader.main

    # Run os_table_loader    
    export PARTIAL_TABLE_NAME="csd_constantBiasShift_pub"
    python3 -m os_table_loader.main

    # Run os_table_loader    
    export PARTIAL_TABLE_NAME="sdrc_controlInfo_pub"
    python3 -m os_table_loader.main

    # Run os_table_loader    
    export PARTIAL_TABLE_NAME="sdrc_curveIdentification_pub"
    python3 -m os_table_loader.main

    # Run os_table_loader    
    export PARTIAL_TABLE_NAME="gaugeDischargeMeas"
    python3 -m os_table_loader.main

    # Run os_table_loader    
    export PARTIAL_TABLE_NAME="gaugePressureRelationship"
    python3 -m os_table_loader.main

    # Run os_table_loader    
    export PARTIAL_TABLE_NAME="priorParameters"
    python3 -m os_table_loader.main

    # Run os_table_loader    
    export PARTIAL_TABLE_NAME="sdrc_sampledParameters_pub"
    python3 -m os_table_loader.main

    # Run os_table_loader    
    export PARTIAL_TABLE_NAME="stageDischargeCurveInfo"
    python3 -m os_table_loader.main

    EOF


  env:
    LOG_LEVEL: DEBUG
    DB_CONFIG_SOURCE: mount
    FILE_TYPE: csv
    OUT_PATH: /pfs/out
  secrets:
  - name: pdr-secret
    mount_path: /var/db_secret
input:
  pfs:
    name: IN_PATH 
    repo: l4discharge_os_table_loader_control_tick
    glob: /*
autoscaling: true
resource_requests:
  memory: 1.5G
  cpu: 1.2
resource_limits:
  memory: 3G
  cpu: 2
sidecar_resource_requests:
  memory: 2G
  cpu: 0.5
datum_set_spec:
  number: 1
scheduling_spec:
  node_selector:
    cloud.google.com/compute-class: pach-pipeline-class
