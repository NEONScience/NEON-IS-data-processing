---
# Not currently used.
pipeline:
  name: troll_cron_daily_and_date_control
transform:
  image: us-central1-docker.pkg.dev/neon-shared-service/neonscience/neon-is-date-cntl:v2.0.1
  env:
    # START_DATE ("YYYY-MM-DD") and END_DATE ("YYYY-MM-DD") indicate the max date range (inclusive) to create the /Y/M/D folder structure
    # If START_DATE is not set (remove line entirely to unset), the start_date and/or the kafka_start_date for each site will be used, as indicated in the site-list json file
    # END_DATE can be set or unset (remove line entirely to unset). If unset, end date will be LAG_DAYS_END ago. 
    LAG_DAYS_END: "2" # Default is 2. Don't go lower than 2.
    START_DATE: "2026-04-25" # Inclusive
    # END_DATE: "2025-09-06" # Inclusive
    OUT_PATH: /pfs/out
    SOURCE_TYPE_AQUATROLL: "aquatroll200"
    SOURCE_TYPE_LEVELTROLL: "leveltroll500"
  cmd:
  - sh
  - "-c"
  - |-
    /bin/bash <<'EOF'
    # Use bash-scrict mode. See http://redsymbol.net/articles/unofficial-bash-strict-mode/
    set -euo pipefail
    IFS=$'\n\t'
    
    # AQUATROLL
    export SOURCE_TYPE=$SOURCE_TYPE_AQUATROLL
    python3 -m cron_daily_and_date_control.cron_daily_and_date_control_main
    
    # LEVELTROLL
    export SOURCE_TYPE=$SOURCE_TYPE_LEVELTROLL
    python3 -m cron_daily_and_date_control.cron_daily_and_date_control_main
    
    EOF
input:
  cross:
  # This cron is the central driver for daily scheduled updates, such as data ingest and metadata loaders.
  # It merges the staging branch of the ingest_trigger into the master branch. There is a cron tick 
  #   in that repo that this pipeline and the metadata loaders will use to trigger daily updates.
  # The key functionality with merging the staging branch into master branch is that multiple commits
  #   can be made to the ingest trigger(s) but processing is triggered only once per day.
  - pfs:
      name: ingest_trigger
      repo: troll_ingest_days
      glob: "/"
      empty_files: True
      branch: master
      trigger: 
        cronSpec: "0 12 * * *" # Run at most every 12 hours (12 hours after an ingest trigger)
        branch: "staging"
  - pfs:
      name: SITE_FILE
      repo: troll_site_list
      glob: /site-list.json
resource_requests:
  memory: 2G
  cpu: 1.5
resource_limits:
  memory: 3G
  cpu: 1.5
sidecar_resource_requests:
  memory: 2G
  cpu: 0.2
autoscaling: true
scheduling_spec:
  node_selector:
    cloud.google.com/compute-class: pach-pipeline-class
